name: moto_ride_os
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  http: ^1.5.0
  connectivity_plus: ^7.0.0
  google_maps_flutter: ^2.7.0
  uuid: ^4.5.1
  notification_listener: ^1.0.2+1
  call_log: ^6.0.1
  url_launcher: ^6.3.2
  flutter_phone_direct_caller: ^2.2.1
  permission_handler: ^12.0.1
  audioplayers: ^6.5.1
  path_provider: ^2.1.5
  wakelock_plus: ^1.3.3
  flutter_callkit_incoming: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  intl_translation: ^0.21.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/l10n/
    - assets/map_styles/
    - assets/config.json
